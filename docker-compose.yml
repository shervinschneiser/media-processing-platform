services:

  backend:
    build:
      context: ./apps/backend

    ports:
      - "8000:8000"

    env_file:
      - ./apps/backend/.env

    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./apps/frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_platform

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: