services:
    backend:
        build:
            context: ./apps/backend

        ports:
            - "8000:8000"

        env_file:
            - ./apps/backend/.env.docker

        depends_on:
            - postgres
            - redis

        volumes:
            - ./storage:/app/storage
            - ./apps/backend:/app

    worker:
        build:
            context: ./apps/backend
        command: celery -A workers.tasks worker --loglevel=info
        env_file:
            - ./apps/backend/.env.docker
        depends_on:
            - postgres
            - redis
        volumes:
            - ./storage:/app/storage
            - ./apps/backend:/app

    frontend:
        build:
            context: ./apps/frontend

        ports:
            - "3000:3000"

        environment:
            - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1

        volumes:
            - ./apps/frontend:/app
            - /app/node_modules
            - /app/.next

        depends_on:
            - backend

    postgres:
        image: postgres:17

        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: media_platform

        ports:
            - "5432:5432"

        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine

        ports:
            - "6379:6379"

        volumes:
            - redis_data:/data

volumes:
    postgres_data:
    redis_data:
